<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Mocha Tests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="lib/mocha.css" />
    <!-- same switchable state management as index.html -->
